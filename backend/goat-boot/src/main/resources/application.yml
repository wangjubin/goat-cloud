spring:
  application:
    name: goat-boot
  profiles:
    active: dev
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/goat_cloud
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

goat:
  security:
    jwt-secret: ${JWT_SECRET:please-change-this-secret-in-production-32chars!}
    access-token-minutes: 30
    refresh-token-days: 7
    token-prefix: "Bearer "
    header-name: Authorization
    initial-password: ${INITIAL_PASSWORD:Admin@123456}
  ai:
    encryption:
      master-key: ${AES_MASTER_KEY:please-change-aes-master-key-32ch!}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
